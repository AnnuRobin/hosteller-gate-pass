name: hosteller_gate_pass
description: Gate pass management system for hostel students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Backend & State Management
  supabase_flutter: ^2.0.0
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  
  # File handling for CSV upload
  file_picker: ^10.3.10
  csv: ^6.0.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0

  # QR Code + PDF export for gate pass download
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
